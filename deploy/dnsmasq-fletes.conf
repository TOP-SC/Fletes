# DNS local en Proxmox — solo red 10.20.2.x (sin tocar DC Azure).
# fletes.top → VM Fletes; todo lo demás → DC.
#
# Instalar: sudo ./deploy/instalar_dnsmasq_proxmox.sh
# Requiere: ejecutar en el NODO Proxmox (no en la VM fletes).

listen-address=@PVE_DNS_IP@
bind-interfaces
no-resolv
server=@DC_DNS_IP@

# App Control de Fletes
address=/fletes.top/@FLETES_VM_IP@
